name: pypi-wheels

# publish when a (published) GitHub Release is created, use the following:
on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: build ${{ matrix.python }} wheel on ${{ matrix.platforms[1] }}
    runs-on: ${{ matrix.platforms[0] }}
    strategy:
      fail-fast: false
      matrix:
        platforms:
          - [ubuntu-latest, manylinux_x86_64]
          - [macos-13, macosx_x86_64]
          # - [macos-14, macosx_arm64]
        python: [cp39, cp310, cp311, cp312, cp313, cp314]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.platforms[1] }}
          CIBW_SKIP: pp*

      - name: archive
        uses: actions/upload-artifact@v4
        with:
          # one artifact per matrix cell; v4 rejects duplicate names
          name: pyre-wheels-${{ matrix.python }}-${{ matrix.platforms[1] }}
          path: wheelhouse/

  upload:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyre
    permissions:
      id-token: write
    # publish only when a GitHub release is created
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: download
        uses: actions/download-artifact@v4
        with:
          # collect every per-cell artifact into a single wheelhouse/
          pattern: pyre-wheels-*
          merge-multiple: true
          path: wheelhouse/

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          packages-dir: wheelhouse/
