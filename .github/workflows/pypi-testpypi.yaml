name: pypi-testpypi

# dry run: build a source distribution and publish it to TestPyPI to exercise
# the trusted-publishing (OIDC) path end to end without touching production
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "the version tag to bundle"
        required: true
        default: "main"

jobs:
  build:
    name: build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: build the artifact
        run: pipx run build --sdist

      - name: archive
        uses: actions/upload-artifact@v4
        with:
          name: pyre-testpypi-source
          path: dist/

  upload:
    name: upload source to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: unpack
        uses: actions/download-artifact@v4
        with:
          name: pyre-testpypi-source
          path: dist

      - name: upload
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI may already hold a same-versioned sdist from a prior run
          skip-existing: true
