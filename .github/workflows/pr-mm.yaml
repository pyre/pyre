name: pr-mm

on:
  pull_request:

jobs:
  # build and test the ref that launched this action
  build:
    name: >-
      ${{matrix.target}}
      python-${{matrix.python}}+
      ${{matrix.compiler}}+${{matrix.stdlib}}

    runs-on: ubuntu-24.04

    container:
      image: ubuntu:24.04

    strategy:
      fail-fast: false

      matrix:
        target: [debug, opt]
        python: ["3.14"]
        compiler: [gcc-15, clang-21]
        stdlib: [libstdc++, libc++]

        include:
          # gcc (libstdc++ only)
          - compiler: gcc-15
            suite: gcc
            suiteVersion: 15
            cc: gcc-15
            cxx: g++-15
            stdlib: libstdc++

          # clang + libstdc++
          - compiler: clang-21
            suite: clang
            suiteVersion: 21
            cc: clang-21
            cxx: clang++-21
            stdlib: libstdc++

          # clang + libc++
          - compiler: clang-21
            suite: clang
            suiteVersion: 21
            cc: clang-21
            cxx: clang++-21
            stdlib: libc++

    steps:
      # --- base system ---
      - name: install base dependencies
        run: |
          apt-get update
          apt-get install -y \
            make git wget lsb-release \
            openssh-server \
            libgsl-dev libopenmpi-dev libhdf5-dev \
            python3 python3-pip python3-dev

      # --- install compilers ---
      - name: install gcc
        if: matrix.suite == 'gcc'
        run: |
          apt-get install -y gcc-15 g++-15

      - name: install clang
        if: matrix.suite == 'clang'
        run: |
          apt get update
          apt-get install -y \
              wget \
              lsb-release \
              software-properties-common \
              gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          ./llvm.sh ${{matrix.suiteVersion}}

      # --- install libc++ when requested ---
      - name: install libc++
        if: matrix.stdlib == 'libc++'
        run: |
          apt-get install -y libc++-dev libc++abi-dev

      # --- python setup ---
      - name: python ${{matrix.python}} setup
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python}}

      - name: install python dependencies
        run: |
          python${pythonVersion} -m pip install --upgrade pip
          pip-${pythonVersion} install graphene numpy pybind11 PyYAML
        env:
          pythonVersion: ${{matrix.python}}

      # --- stdlib flags ---
      - name: configure stdlib flags
        run: |
          if [ "${{matrix.stdlib}}" = "libc++" ]; then
            echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
            echo "LDFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          fi

      # --- diagnostics ---
      - name: versions
        run: |
          python${pythonVersion} --version
          ${{matrix.cc}} --version
          ${{matrix.cxx}} --version
          echo "CXXFLAGS=$CXXFLAGS"
        env:
          pythonVersion: ${{matrix.python}}

      # --- sources ---
      - name: clone mm
        run: |
          git clone https://github.com/aivazis/mm

      - name: checkout pyre
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          path: 'pyre'

      # --- mm setup ---
      - name: mm diagnostics
        run: |
          cd pyre

          mkdir -p ~/.pyre ~/.mm
          cp .github/matrix/mm.pfg ~/.pyre
          cp .github/matrix/config.mm ~/.mm

          ${mm} host.info
          ${mm} builder.info
          ${mm} extern.numpy.info
          ${mm} extern.pybind11.info

        env:
          mm: python${pythonVersion} ${{github.workspace}}/mm/mm.py --config=.github/matrix/mm.pfg
          pythonVersion: ${{matrix.python}}
          suite: ${{matrix.suite}}
          suiteVersion: ${{matrix.suiteVersion}}

      # --- build ---
      - name: build pyre
        run: |
          cd pyre
          ${mm}
        env:
          mm: python${pythonVersion} ${{github.workspace}}/mm/mm.py --config=.github/matrix/mm.pfg
          pythonVersion: ${{matrix.python}}
          suite: ${{matrix.suite}}
          suiteVersion: ${{matrix.suiteVersion}}

      # --- test ---
      - name: test pyre
        run: |
          cd pyre
          ${mm} tests
        env:
          mm: python${pythonVersion} ${{github.workspace}}/mm/mm.py --config=.github/matrix/mm.pfg
          pythonVersion: ${{matrix.python}}
          suite: ${{matrix.suite}}
          suiteVersion: ${{matrix.suiteVersion}}

